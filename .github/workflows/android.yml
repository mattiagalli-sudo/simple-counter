name: Android CI

on:
  workflow_dispatch:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew
      working-directory: ./simple-counter
      
    - name: Build with Gradle
      run: ./gradlew build
      working-directory: ./simple-counter

    - name: Upload APK to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: ./simple-counter/app/build/outputs/apk/
